<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Request Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">
<div class="max-w-7xl mx-auto space-y-6">
    <!-- Header Section -->
    <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
        <!-- Search Bar -->
        <div class="flex-1 w-full md:w-auto">
            <form th:action="@{/requests/search}" method="get" class="flex gap-2">
                <input type="text" name="query" placeholder="Search requests..."
                       class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500">
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
                    Search
                </button>
            </form>
        </div>

        <!-- Action Buttons -->
        <div class="flex gap-2">
            <a th:href="@{/requests/create}"
               class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                Create Request
            </a>
        </div>
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="bg-blue-50 p-4 rounded-lg shadow-sm">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-blue-100 rounded-full">
                    <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                </div>
                <div>
                    <p class="text-sm text-gray-500">Total Requests</p>
                    <p class="text-xl font-bold" th:text="${totalRequests}"></p>
                </div>
            </div>
        </div>

        <div class="bg-yellow-50 p-4 rounded-lg shadow-sm">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-yellow-100 rounded-full">
                    <svg class="w-6 h-6 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <div>
                    <p class="text-sm text-gray-500">Pending Requests</p>
                    <p class="text-xl font-bold" th:text="${pendingRequests}"></p>
                </div>
            </div>
        </div>

        <div class="bg-green-50 p-4 rounded-lg shadow-sm">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-green-100 rounded-full">
                    <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <div>
                    <p class="text-sm text-gray-500">Approved Requests</p>
                    <p class="text-xl font-bold" th:text="${approvedRequests}"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Filters Section -->
    <div class="bg-white rounded-lg shadow-sm p-4 space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <!-- Request Type Filter -->
            <div class="space-y-2">
                <form th:action="@{/requests/filter(field='type')}">
                    <input type="hidden" name="field" value="type"/>
                    <label class="block text-sm font-medium text-gray-700">Request Type</label>
                    <select name="value" onchange="this.form.submit()"
                            class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500">
                        <option value="all">All Types</option>
                        <option value="PROMOTION">Promotion</option>
                        <option value="SALARY_INCREASE">Salary Increase</option>
                        <option value="TRANSFER">Transfer</option>
                        <option value="OTHER">Other</option>
                    </select>
                </form>
            </div>

            <!-- Status Filter -->
            <div class="space-y-2">
                <form th:action="@{/requests/filter(field='status')}">
                    <input type="hidden" name="field" value="status"/>
                    <label class="block text-sm font-medium text-gray-700">Request Status</label>
                    <select name="value" onchange="this.form.submit()"
                            class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500">
                        <option value="all">All Statuses</option>
                        <option value="PENDING">Pending</option>
                        <option value="APPROVED">Approved</option>
                        <option value="REJECTED">Rejected</option>
                    </select>
                </form>
            </div>

            <!-- Date Range Filter -->
            <div class="space-y-2">
                <form th:action="@{/requests/filter(field='dateRange')}">
                    <input type="hidden" name="field" value="dateRange"/>
                    <label class="block text-sm font-medium text-gray-700">Date Range</label>
                    <input type="text" name="value" class="w-full p-2 border rounded-md cursor-pointer date-range-picker">
                </form>
            </div>
        </div>
    </div>

    <!-- Requests Table -->
    <div class="bg-white rounded-lg shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full min-w-[1024px]">
                <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase w-8">
                        <input type="checkbox" class="rounded border-gray-300">
                    </th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Employee</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Request Type</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Request Date</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Details</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-200 min-h-[400px]">
                <tr th:each="r : ${requests.content}" class="hover:bg-gray-50 transition-colors">
                    <td class="px-6 py-4">
                        <input type="checkbox" class="rounded border-gray-300">
                    </td>
                    <td class="px-6 py-4">
                        <span th:text="${r.employeeName}"></span>
                    </td>
                    <td class="px-6 py-4">
                        <span th:text="${r.type}" class="capitalize"></span>
                    </td>
                    <td class="px-6 py-4">
                        <span th:text="${#temporals.format(r.requestDate, 'dd/MM/yyyy')}"></span>
                    </td>
                    <td class="px-6 py-4">
                        <button class="text-blue-600 hover:text-blue-800"
                                onclick="showRequestDetails('[[${r.id}]]')">
                            View Details
                        </button>
                    </td>
                    <td class="px-6 py-4">
                        <span th:text="${r.status}"
                              th:class="${r.status == 'PENDING'} ?
                                  'px-2 py-1 rounded-full text-sm bg-yellow-100 text-yellow-800' :
                                  ${r.status == 'APPROVED'} ?
                                  'px-2 py-1 rounded-full text-sm bg-green-100 text-green-800' :
                                  'px-2 py-1 rounded-full text-sm bg-red-100 text-red-800'"></span>
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex gap-2">
                            <button th:if="${r.status == 'PENDING'}"
                                    class="text-green-600 hover:text-green-800"
                                    onclick="approveRequest('[[${r.id}]]')">
                                Approve
                            </button>
                            <button th:if="${r.status == 'PENDING'}"
                                    class="text-red-600 hover:text-red-800"
                                    onclick="rejectRequest('[[${r.id}]]')">
                                Reject
                            </button>
                        </div>
                    </td>
                </tr>
                <tr th:if="${requests.empty}" class="h-[400px]">
                    <td colspan="7" class="text-center text-gray-500 py-8">
                        No requests found
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="sticky bottom-0 bg-white border-t px-4 py-3">
            <div class="flex items-center justify-between">
                <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
                    <div>
                        <p class="text-sm text-gray-700" th:if="${!requests.empty}">
                            Showing
                            <span class="font-medium" th:text="${requests.number * requests.size + 1}"></span>
                            to
                            <span class="font-medium" th:text="${(requests.number + 1) * requests.size > requests.totalElements ? requests.totalElements : (requests.number + 1) * requests.size}"></span>
                            of
                            <span class="font-medium" th:text="${requests.totalElements}"></span>
                            results
                        </p>
                    </div>
                    <div>
                        <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination">
                            <a th:href="@{/requests(page=${requests.number - 1})}"
                               class="relative inline-flex items-center px-2 py-2 rounded-l-md border bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                                <span class="sr-only">Previous</span>
                                <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd"/>
                                </svg>
                            </a>
                            <th:block th:each="i : ${#numbers.sequence(0, requests.totalPages - 1)}">
                                <a th:href="@{/requests(page=${i})}"
                                   th:class="${i == requests.number} ?
                                       'z-10 bg-blue-50 border-blue-500 text-blue-600 relative inline-flex items-center px-4 py-2 border text-sm font-medium' :
                                       'bg-white border-gray-300 text-gray-500 hover:bg-gray-50 relative inline-flex items-center px-4 py-2 border text-sm font-medium'"
                                   th:text="${i + 1}"></a>
                            </th:block>
                            <a th:href="@{/requests(page=${requests.number + 1})}"
                               class="relative inline-flex items-center px-2 py-2 rounded-r-md border bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                                <span class="sr-only">Next</span>
                                <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 0101.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/>
                                </svg>
                            </a>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Request Details Modal -->
<div id="requestDetailsModal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full">
    <div class="relative top-20 mx-auto p-5 border w-11/12 max-w-2xl shadow-lg rounded-md bg-white">
        <div class="mt-3 text-center">
            <h3 class="text-lg leading-6 font-medium text-gray-900">Request Details</h3>
            <div class="mt-2 px-7 py-3">
                <div id="requestDetailsContent"></div>
            </div>
            <div class="items-center px-4 py-3">
                <button onclick="closeModal()"
                        class="px-4 py-2 bg-gray-500 text-white text-base font-medium rounded-md shadow-sm hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-gray-300">
                    Close
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // JavaScript functions for request management
    function showRequestDetails(requestId) {
        // Fetch request details and populate modal
        fetch(`/requests/${requestId}/details`)
            .then(response => response.json())
            .then(data => {
                document.getElementById('requestDetailsContent').innerHTML = `
                    <p><strong>Employee:</strong> ${data.employeeName}</p>
                    <p><strong>Type:</strong> ${data.type}</p>
                    <p><strong>Request Date:</strong> ${new Date(data.requestDate).toLocaleDateString()}</p>
                    <p><strong>Details:</strong> ${data.details}</p>
                    <p><strong>Status:</strong> ${data.status}</p>
                `;
                document.getElementById('requestDetailsModal').classList.remove('hidden');
            });
    }

    function closeModal() {
        document.getElementById('requestDetailsModal').classList.add('hidden');
    }

    function approveRequest(requestId) {
        if (confirm('Are you sure you want to approve this request?')) {
            fetch(`/requests/${requestId}/approve`, { method: 'POST' })
                .then(response => {
                    if (response.ok) {
                        location.reload();
                    }
                });
        }
    }

    function rejectRequest(requestId) {
        if (confirm('Are you sure you want to reject this request?')) {
            fetch(`/requests/${requestId}/reject`, { method: 'POST' })
                .then(response => {
                    if (response.ok) {
                        location.reload();
                    }
                });
        }
    }
</script>
</body>
</html>
